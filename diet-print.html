<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ஆதித்யா · வார உணவு அட்டவணை</title>
<style>
  @page { size: A6 portrait; margin: 7mm; }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Nirmala UI","Latha","Noto Sans Tamil",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
       background:#e9e9e9;color:#111;line-height:1.45;padding:16px}

  .noprint{background:#f0f4dd;border:1px solid #c9d98a;border-radius:8px;padding:10px 12px;
           margin:0 auto 16px;font-size:12.5px;max-width:620px}
  .noprint b{color:#4a6100}
  .btn{font:inherit;font-weight:700;background:#111;color:#fff;border:none;border-radius:6px;padding:8px 15px;cursor:pointer;margin:8px 6px 0 0}
  .lang{background:#fff;color:#555;border:1px solid #aaa}
  .lang.on{background:#4a6100;color:#fff;border-color:#4a6100}

  /* one A6 card */
  .card{
    width:105mm; min-height:148mm; background:#fff; padding:7mm;
    margin:0 auto 16px; display:flex; flex-direction:column;
    box-shadow:0 2px 10px rgba(0,0,0,.18);
  }
  h1{font-size:17px;margin-bottom:.5mm}
  .pg{font-size:11px;color:#888;margin-bottom:2mm}

  /* the day rows share whatever height is left — no dead space */
  .days{flex:1;display:flex;flex-direction:column}
  .day{flex:1;display:flex;flex-direction:column;justify-content:center;
       border-top:1px solid #bbb;padding:1.5mm 1.5mm 1.5mm 0}
  .day:first-of-type{border-top:1.5px solid #333}
  .dn{font-weight:700;font-size:15.5px;margin-bottom:.6mm}
  .dn span{font-weight:400;color:#888;font-size:11px;margin-left:5px}
  .ln{font-size:13.5px;padding-left:1mm;line-height:1.4}
  .ln b{font-weight:700}
  .lbl{color:#777;font-size:11.5px}
  .add{color:#1a6b34;font-weight:700}
  .free{font-weight:700}

  .din{margin-top:2mm;border:1.5px solid #333;border-radius:2mm;padding:2mm 2.5mm;font-size:14px}
  .din .lbl{display:block;margin-bottom:.5mm}

  .day.rest{background:#fdf1ea}
  .day.long{background:#fff9e6}

  @media print {
    .noprint{display:none}
    body{background:#fff;padding:0}
    .card{width:auto;min-height:0;height:134mm;margin:0;padding:0;box-shadow:none;page-break-after:always}
    .card:last-of-type{page-break-after:auto}
  }
</style>
</head>
<body>

<div class="noprint">
  <b>To print:</b> ⌘P (or Ctrl+P) → paper size <b>A6</b> → turn ON “Background graphics” → Print. Comes out as <b>2 cards</b>.
  <br><i>No A6 in the list? Pick A4, set Scale to “Fit”, print, and cut. Or print A6 4-up.</i>
  <br>
  <button class="btn lang on" id="bta" onclick="render(1)">தமிழ்</button>
  <button class="btn lang" id="ben" onclick="render(0)">English</button>
  <button class="btn" onclick="window.print()">🖨️ Print</button>
</div>

<div id="cards"></div>

<script src="diet-data.js"></script>
<script>
const PAGES = [['Mon','Tue','Wed','Thu'], ['Fri','Sat','Sun']];

const L = {
  title:  ['Aditya — Weekly Food',         'ஆதித்யா — வார உணவு'],
  bf:     ['Morning',                      'காலை'],
  lun:    ['Lunch',                        'மதியம்'],
  dinAll: ['Dinner — same every day',      'இரவு — தினமும் இதுவே'],
  eggs3:  ['3 boiled eggs',                '3 வேகவைத்த முட்டை'],
  sundal: ['sundal',                       'சுண்டல்'],
  dal:    ['dal (with salt)',              'பருப்பு (உப்பு சேர்த்து)'],
  curd:   ['curd',                         'தயிர்'],
  fruit:  ['1 fruit',                      '1 பழம்'],
  freeNote:['anything he likes, one meal', 'பிடித்தது எதுவும் — ஒரு வேளை'],
  long:   ['long run',                     'நீண்ட ஓட்டம்'],
  rest:   ['rest day',                     'ஓய்வு நாள்']
};
const DAY = {
  Mon:['Monday','திங்கள்'], Tue:['Tuesday','செவ்வாய்'], Wed:['Wednesday','புதன்'],
  Thu:['Thursday','வியாழன்'], Fri:['Friday','வெள்ளி'], Sat:['Saturday','சனி'], Sun:['Sunday','ஞாயிறு']
};
const NOTE = {training:null, long:'long', rest:'rest'};

function render(i){
  const L_ = k => L[k][i];
  const v  = (key,d) => V[key][d][i];
  document.documentElement.lang = i ? 'ta' : 'en';

  document.getElementById('cards').innerHTML = PAGES.map((days, pi) => {
    const rows = days.map(d => {
      const t = TYPE[d];
      const lunch = t === 'long'
        ? `<span class="free">${v('carb',d)}</span> <span class="lbl">${L_('freeNote')}</span>`
        : `${v('carb',d)} · ${L_('dal')} · ${v('veg',d)}`
          + (v('extra',d).startsWith('+') ? ` <span class="add">${v('extra',d)}</span>` : '');
      const note = NOTE[t] ? `<span>${L_(NOTE[t])}</span>` : '';
      return `<div class="day ${t}">
        <div class="dn">${DAY[d][i]}${note}</div>
        <div class="ln"><span class="lbl">${L_('bf')}:</span> ${L_('eggs3')} · <b>${v('millet',d)}</b> · ${v('sundal',d)} ${L_('sundal')}</div>
        <div class="ln"><span class="lbl">${L_('lun')}:</span> ${lunch}</div>
      </div>`;
    }).join('');
    return `<div class="card">
      <h1>${L_('title')}</h1>
      <div class="pg">${pi+1} / ${PAGES.length}</div>
      <div class="days">${rows}</div>
      <div class="din"><span class="lbl">${L_('dinAll')}</span>
        <b>${L_('eggs3')} · ${L_('curd')} · ${L_('fruit')}</b></div>
    </div>`;
  }).join('');

  document.getElementById('bta').classList.toggle('on', i === 1);
  document.getElementById('ben').classList.toggle('on', i === 0);
}
render(1);   // amma's card — Tamil by default
</script>
</body>
</html>
