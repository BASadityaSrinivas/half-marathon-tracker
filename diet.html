<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Aditya · Today's Food</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%230f1115'/><text x='50' y='66' font-family='Arial' font-size='30' font-weight='800' text-anchor='middle' fill='%23c2f000'>🍱</text></svg>" />
<meta name="theme-color" content="#0f1115" />
<style>
  :root{
    --bg:#0f1115; --card:#181b22; --line:#2a2f3a;
    --txt:#e7eaf0; --muted:#8b93a3; --accent:#c2f000; --warn:#ff8a5b; --free:#ffd23f;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--txt);line-height:1.55;padding:20px 18px 40px;max-width:620px;margin:0 auto;-webkit-font-smoothing:antialiased}
  a{color:var(--accent);text-decoration:none}
  .back{font-size:.8rem;color:var(--muted);display:inline-block;margin-bottom:16px}

  .head{display:flex;align-items:baseline;gap:9px;margin-bottom:4px}
  h1{font-size:1.5rem;letter-spacing:-.02em}
  .badge{font-size:.66rem;font-weight:700;padding:3px 9px;border-radius:99px;background:var(--accent);color:#0f1115}
  .badge.rest{background:#2a2f3a;color:var(--muted)}
  .badge.long{background:#4ad17c;color:#0f1115}
  .sub{color:var(--muted);font-size:.83rem;margin-bottom:20px}

  /* the single list */
  .row{display:flex;gap:12px;padding:13px 0;border-top:1px solid var(--line)}
  .row:first-of-type{border-top:none}
  .when{flex:none;width:74px;font-size:.78rem;font-weight:700;color:var(--muted);padding-top:1px}
  .when small{display:block;font-weight:400;font-size:.68rem;opacity:.72}
  .what{flex:1}
  .what div{font-size:.92rem;padding:1px 0}
  .what .note{font-size:.75rem;color:var(--muted);margin-top:3px}
  .what .note.hot{color:var(--warn)}

  /* inline day-dropdown for the changing items */
  select{
    font:inherit;font-size:.92rem;font-weight:600;color:var(--accent);
    background:transparent;border:none;border-bottom:1px dashed #4a5568;
    padding:0 16px 1px 0;cursor:pointer;-webkit-appearance:none;appearance:none;
  }
  .sel{position:relative;display:inline-block}
  .sel::after{content:"▾";position:absolute;right:2px;top:0;color:#5c677d;font-size:.72rem;pointer-events:none}
  select:focus{outline:none;border-bottom-color:var(--accent)}
  select option{background:#181b22;color:var(--txt);font-weight:400}
  .sel.big select{font-size:1.5rem;font-weight:700;letter-spacing:-.02em;color:var(--txt);padding-right:22px;border-bottom-style:solid;border-bottom-color:var(--accent)}
  .sel.big::after{font-size:1rem;color:var(--accent);top:4px}
  .v{color:var(--accent);font-weight:600}

  .free{color:var(--free);font-weight:700}
  .foot{margin-top:26px;padding-top:16px;border-top:1px solid var(--line);font-size:.78rem;color:var(--muted)}
  .foot b{color:var(--txt)}
  .foot .tot{color:var(--accent);font-weight:700}
  .rules{display:block;text-align:center;margin-top:18px;padding:12px;border:1px solid var(--line);
    border-radius:12px;font-size:.85rem;font-weight:600;color:var(--muted)}
  .rules:hover{border-color:var(--accent);color:var(--accent)}
</style>
</head>
<body>
<a class="back" href="./">← Back to tracker</a>

<div class="head">
  <span class="sel big"><select id="daysel"></select></span>
  <span class="badge" id="daytype">Training</span>
</div>
<div class="sub" id="sub">Today. Change the day above to look ahead.</div>

<div id="list"></div>

<div class="foot" id="foot"></div>

<a class="rules" href="diet-rules.html">📖 The rules &amp; why →</a>
<a class="rules" href="diet-print.html">🖨️ Amma's weekly sheet (print) →</a>

<script src="diet-data.js"></script>
<script>
const ORDER = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const FULL = {Mon:'Monday',Tue:'Tuesday',Wed:'Wednesday',Thu:'Thursday',Fri:'Friday',Sat:'Saturday',Sun:'Sunday'};
const LABEL = {training:'Training',long:'Long run',rest:'Rest'};
const today = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][new Date().getDay()];

const v = (key,d) => `<span class="v">${V[key][d][0]}</span>`;  // [0] = english

function render(d){
  const t = TYPE[d];
  const rows = [
    ['6 AM','wake', [
      'Warm water + lemon + pinch salt',
      '2 cashew · 2 almonds · 1 walnut'
    ]],
    t==='rest' ? null : ['⚡ Workout','any time', [
      '<b>Before:</b> nothing needed',
      '<b>After:</b> 1 banana'
    ]],
    ['9 AM','breakfast', [
      '3 boiled eggs',
      v('millet',d),
      v('sundal',d) + ' sundal — <b>1 full cup</b>'
    ]],
    ['1 PM','lunch', t==='long' ? [
      v('carb',d),
      '<span class="note">Eat whatever you want. One meal, zero guilt — straight back on plan at dinner.</span>'
    ] : [
      (V.carb[d][2] ? V.carb[d][2] + ' ' : '') + v('carb',d),
      '<b>1 generous bowl</b> dal',
      '2 fists ' + v('veg',d),
      v('extra',d),
      '1 tsp ghee <span class="note" style="display:inline">— at your plate, not the pot</span>'
    ]],
    ['4 PM','snack', [
      '1 glass buttermilk',
      t==='rest' ? '<span class="note">no chana — rest day</span>'
                 : '1 cupped hand chana <i>or</i> 3 cups popcorn'
    ]],
    ['6 PM','dinner', [
      '<b>3 boiled eggs</b>',
      '<b>1 full cup</b> curd',
      '1 fruit'
    ]],
    ['7 PM','or when the urge hits', [
      '<b>1 big glass (300 ml)</b> milk + 1 tsp plain cocoa, no sugar',
      '<span class="note hot">One glass a day. This is what you reach for instead of the sweets box.</span>'
    ]]
  ].filter(Boolean);

  const b = document.getElementById('daytype');
  b.textContent = LABEL[t]; b.className = 'badge ' + t;

  document.getElementById('sub').textContent =
    d === today ? 'Today. Change the day above to look ahead.' : 'Not today — you\'re looking at ' + FULL[d] + '.';

  document.getElementById('list').innerHTML = rows.map(r =>
    `<div class="row"><div class="when">${r[0]}<small>${r[1]}</small></div>
     <div class="what">${r[2].map(x=>`<div>${x}</div>`).join('')}</div></div>`).join('');

  document.getElementById('foot').innerHTML =
    t === 'long'  ? '🎉 <b>Free meal at lunch</b> — eat what you want, one meal, zero guilt. Back on plan at dinner.'
  : t === 'rest'  ? '≈ <span class="tot">1700 kcal</span> · ~85g protein · <b>Rest day = your sweets danger day.</b> Raw carrot &amp; cucumber ready in the fridge.'
  :                 '≈ <span class="tot">1950 kcal</span> · ~90g protein · 1 sweet · <b>Free anytime:</b> raw carrot, cucumber, amla, soup, buttermilk, hibiscus tea.';
}

const dsel = document.getElementById('daysel');
dsel.innerHTML = ORDER.map(d =>
  `<option value="${d}" ${d===today?'selected':''}>${FULL[d]}${d===today?' · today':''}</option>`).join('');
dsel.onchange = e => render(e.target.value);
render(today);
</script>
</body>
</html>
